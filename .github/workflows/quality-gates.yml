name: quality-gates

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - dev
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run optional integration tests with PostgreSQL service"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

  unit-test:
    name: unit-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run unit tests
        env:
          GOCACHE: /tmp/gocache
        run: go test ./tests/unit/... -v

  integration-test:
    name: integration-test
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: library_test
        options: >-
          --health-cmd "pg_isready -U postgres -d library_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run integration tests
        env:
          GOCACHE: /tmp/gocache
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: library_test
          DB_SSLMODE: disable
        run: go test ./tests/integration/... -v
